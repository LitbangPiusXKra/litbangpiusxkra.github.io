<div class="kotak-tabel">
    <div class="wadah-tabel-responsive">
        <table class="tabel-rutin">
            <thead>
                <tr>
                    <th>HARI</th>
                    <th>WAKTU</th>
                    <th>KETERANGAN / MISA</th>
                    <th>TEMPAT / WILAYAH</th>
                </tr>
            </thead>
            <tbody id="isi-jadwal-dinamis">
                <tr>
                    <td colspan="4" style="text-align:center; padding:20px; color:#888;">
                        Sedang memuat jadwal misa...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Menggunakan format gviz agar data diambil langsung dari Google tanpa perantara API AllOrigins
    const sheetID = "1vSK_4Lki0EmzXCJX8Uqh90AbbLYwfVjM4DimWmhxk5BrfD3eNITQIHOdON4gzmMEBu3kvEOadsaCs45"; // ID dari link Anda
    const urlDirect = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

    fetch(urlDirect)
        .then(response => response.text())
        .then(dataText => {
            // Google mengembalikan data dengan bungkus fungsi google.visualization.Query.setResponse()
            // Kita perlu memotong bungkus tersebut agar menjadi JSON murni
            const jsonString = dataText.substring(dataText.indexOf("{"), dataText.lastIndexOf("}") + 1);
            const json = JSON.parse(jsonString);
            
            const rows = json.table.rows;
            let isiTabel = '';

            // Looping data baris demi baris dari Google Sheets
            rows.forEach(row => {
                // Mengambil nilai dari tiap kolom (kolom 0=Hari, 1=Waktu, 2=Keterangan, 3=Tempat)
                const hari = row.c[0] ? row.c[0].v : '';
                const waktu = row.c[1] ? row.c[1].v : '';
                const keterangan = row.c[2] ? row.c[2].v : '';
                const sumber = row.c[3] ? row.c[3].v : '';

                // Validasi: Jika baris kosong, jangan dimasukkan ke tabel
                if (!hari && !waktu && !keterangan) return;

                isiTabel += `
                    <tr>
                        <td><span class="pil-hari">${hari || '-'}</span></td>
                        <td class="waktu-tebal">${waktu || '-'} WIB</td>
                        <td class="keterangan-teks">${keterangan || '-'}</td>
                        <td class="sumber-teks">${sumber || '-'}</td>
                    </tr>
                `;
            });

            document.getElementById('isi-jadwal-dinamis').innerHTML = isiTabel || `
                <tr><td colspan="4" style="text-align:center; padding:20px;">Tidak ada jadwal misa untuk saat ini.</td></tr>
            `;
        })
        .catch(error => {
            console.error("Error Detail:", error);
            document.getElementById('isi-jadwal-dinamis').innerHTML = `
                <tr>
                    <td colspan="4" style="text-align:center; color:#e74c3c; padding:20px; font-weight:600;">
                        ⚠️ Gagal memuat jadwal secara live. Silakan segarkan halaman beberapa saat lagi.
                    </td>
                </tr>
            `;
        });
</script>
